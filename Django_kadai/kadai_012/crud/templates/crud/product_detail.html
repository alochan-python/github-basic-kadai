{% extends "base.html" %}

{% block title %}商品明細{% endblock %}
{% block content %}

<h1>商品明細</h1>
<table class="table table-striped table-hover table-bordered">
   <tr>
      <th>商品名</th>
      <td>{{ object.name }}</td>
   </tr>
   <tr>
      <th>価格</th>
      <td>{{ object.price }} 円</td>
   </tr>
   <tr>
      <th>カテゴリ</th>
      <td>{{ object.category }}</td>
   </tr>
   <tr>
      <th>商品画像</th>
      <td><img src="{{ object.img.url }}" style="width:100px; height:auto;"></td>
   </tr>
   <tr>
      <th>商品説明</th>
      <td>{{ object.description|default_if_none:"未登録"|linebreaksbr }}</td>
   </tr>
</table>
   <a href="{% url 'list' %}">戻る</a>
{% endblock %}
